<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEROLINE</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<header class="site-header">
    <div class="header-container">
        <div class="logo">Ø ZEROLINE</div>
        
        <div class="header-right">
            <nav class="nav">
                <a href="#" class="home-link">HOME</a>
            </nav>
            <div class="circle-icon">
                <div class="inner-square"></div>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="top-section-container">
        
        <div class="left-group">
    <div class="control-buttons">
        <div class="empty"></div>
        <div class="btn up">▲</div>
        <div class="empty"></div>
        <div class="btn left outline-btn">◀</div>
        <div class="btn down">▼</div>
        <div class="btn right">▶</div>
    </div>

    <div class="instructions">
        <p>Use <strong>ARROWS BUTTON</strong></p>
        <p><strong>OR MOUSE</strong></p>
        <p class="small-text">for select category</p>
        
        <div class="spacer"></div>
        
        <p>Press <strong>ENTER</strong></p>
        <p class="small-text">to go inside</p>
    </div>
</div>

        <div class="right-group">
            <div class="divider"></div>
            <section class="description">
                <p>THIS IS THE HOME SCREEN.</p>
                <p>HERE YOU CAN SELECT</p>
                <p>THE SECTION</p>
                <p>OF THE SITE</p>
            </section>
        </div>
    </div>

    <div class="content-grid">
        <div class="grid-item main-section">
            <p class="section-label">MAIN</p>
            <p class="section-letter">A</p>
        </div>
        <div class="grid-item">
            <p class="section-label">ABOUT</p>
            <p class="section-letter">B</p>
        </div>
        <div class="grid-item">
            <p class="section-label">ARTICLES</p>
            <p class="section-letter">C</p>
        </div>
        <div class="grid-item">
            <p class="section-label">CASES</p>
            <p class="section-letter">D</p>
        </div>
        <div class="grid-item">
            <p class="section-label">CONTACTS</p>
            <p class="section-letter">E</p>
        </div>
    </div>
</main>

</body>
</html>
